name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Pull Docker images for integration tests
        run: docker pull ubuntu:24.04
      - name: Build gateway binary for integration tests
        run: cargo build -p strait-gateway
      - run: cargo test --all-features
      - name: Verify launch integration tests actually ran
        run: |
          output=$(cargo test --test launch_integration 2>&1)
          echo "$output"
          # Fail if any test printed the skip message (docker should be available in CI)
          if echo "$output" | grep -q "Skipping: Docker not available"; then
            echo "::error::Launch integration tests were skipped — Docker should be available in CI"
            exit 1
          fi
          # Verify expected test count (currently 8 tests in launch_integration)
          if ! echo "$output" | grep -qE "test result: ok\. [0-9]+ passed"; then
            echo "::error::Launch integration tests did not report passing results"
            exit 1
          fi
      - run: cargo clippy --all-features -- -D warnings
      - run: cargo fmt --check

  build:
    needs: test
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
      - run: cargo build --release --target ${{ matrix.target }}
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: strait-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/strait

  build-gateway:
    needs: test
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
          - target: aarch64-unknown-linux-musl
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Install musl tools (x86_64)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools
      - name: Install aarch64 musl cross-compiler
        if: matrix.target == 'aarch64-unknown-linux-musl'
        run: |
          curl --retry 3 --retry-delay 10 --retry-all-errors -sSfL \
            -o /tmp/aarch64-linux-musl-cross.tgz \
            https://musl.cc/aarch64-linux-musl-cross.tgz
          tar xzf /tmp/aarch64-linux-musl-cross.tgz -C /tmp
          echo "/tmp/aarch64-linux-musl-cross/bin" >> $GITHUB_PATH
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER=aarch64-linux-musl-gcc" >> $GITHUB_ENV
      - run: cargo build --release --package strait-gateway --target ${{ matrix.target }}
      - name: Verify static linking
        run: |
          file target/${{ matrix.target }}/release/strait-gateway
          if file target/${{ matrix.target }}/release/strait-gateway | grep -q "dynamically linked"; then
            echo "::error::strait-gateway is not statically linked"
            exit 1
          fi
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: strait-gateway-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/strait-gateway
