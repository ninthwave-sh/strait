# strait.toml — Claude Code sandbox configuration.
#
# Designed for Claude Code Max (OAuth). Anthropic traffic passes through
# as a plain CONNECT tunnel -- no MITM, no credential injection. OAuth
# tokens live in ~/.claude/ mounted into the container.
#
# GitHub and npm traffic is MITM'd for policy evaluation and credential
# injection. The agent never sees the real tokens.
#
# The [container] section auto-builds an image with Claude Code and
# dependencies installed. No Dockerfile needed.

ca_cert_path = "/tmp/strait-ca.pem"

[mitm]
hosts = [
    "api.github.com",
    "registry.npmjs.org",
]

# GitHub API — inject Authorization header
[[credential]]
host = "api.github.com"
header = "Authorization"
value_prefix = "token "
source = "env"
env_var = "GITHUB_TOKEN"

# npm registry — inject Authorization header (for private packages)
[[credential]]
host = "registry.npmjs.org"
header = "Authorization"
value_prefix = "Bearer "
source = "env"
env_var = "NPM_TOKEN"

[container]
base_image = "ubuntu:24.04"
apt = ["git", "curl", "ca-certificates"]
npm = ["@anthropic-ai/claude-code"]

[identity]
header = "X-Strait-Agent"
default = "claude-code"

[audit]
log_path = "/tmp/strait-audit.jsonl"
